name: Auto Blog Pipeline - IPU Admissions

on:
  schedule:
    # Runs daily at 9:00 AM IST (UTC+5:30 = 3:30 AM UTC)
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 anthropic

      - name: Scrape notifications and generate blog posts
        run: python automation/scrape-and-generate.py

      - name: Deploy blog posts to FTP
        run: python automation/deploy-blog.py

      - name: Commit updated published.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/published.json
          git diff --cached --quiet || git commit -m "Update published.json with new blog entries"
          git push
